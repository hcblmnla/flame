name: Build

on:
    workflow_dispatch:
    pull_request:
    push:

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build
        permissions:
            contents: read
            packages: write
            pull-requests: write

        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-java@v4
                with:
                    java-version: '22'
                    distribution: 'temurin'
                    cache: maven

            -   name: maven build
                run: mvn package
